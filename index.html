<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LifeScrum | Personal Scrum Board</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="main-header">
        <div class="header-left">
            <h1 class="logo">LifeScrum</h1>
            <div class="hunter-level" title="Shadow Monarch rank — complete quests to gain XP">
                <span id="level-badge" class="level-badge">Lv. 1</span>
                <div class="xp-bar"><div id="xp-fill" class="xp-fill"></div></div>
            </div>
        </div>
        <div class="header-center">
            <span id="sprint-display">Sprint: --</span>
            <span id="days-remaining" class="days-badge">⏳ -- days remaining</span>
        </div>
        <div class="header-right">
            <button id="btn-summary" class="btn-ghost">Sprint Summary</button>
            <button id="btn-past-sprints" class="btn-ghost">Past Sprints</button>
            <button id="btn-sync" class="btn-ghost btn-sync">☁ Sync</button>
        </div>
    </header>

    <main id="board-container">
        <div id="scrum-board" class="board-grid">
            <!-- Headers and content generated by JS -->
        </div>
        <div class="lane-controls">
            <button id="btn-add-lane" class="btn-add-lane">+ Add Lane</button>
            <div id="add-lane-inline" class="add-lane-inline" style="display:none;">
                <input type="text" id="add-lane-input" placeholder="Lane name…" maxlength="60">
            </div>
        </div>
    </main>

    <!-- Side Drawer -->
    <div id="drawer-overlay" class="overlay"></div>
    <aside id="card-drawer" class="drawer">
        <div class="drawer-header">
            <input type="text" id="drawer-title" placeholder="Card title" class="input-title">
            <button id="btn-close-drawer" class="btn-close" aria-label="Close">&times;</button>
        </div>
        <div class="drawer-body">
            <div class="field-group">
                <label>Priority</label>
                <div class="priority-toggle">
                    <button data-priority="high" class="pri-btn high">High</button>
                    <button data-priority="normal" class="pri-btn normal">Normal</button>
                    <button data-priority="low" class="pri-btn low">Low</button>
                </div>
            </div>
            <div class="field-group">
                <label>Lane</label>
                <select id="drawer-lane-select"></select>
            </div>
            <div class="field-group">
                <label>Column</label>
                <select id="drawer-column-select">
                    <option value="Ice Box">Ice Box</option>
                    <option value="Emergency">Emergency</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Unclear">Unclear</option>
                    <option value="Complete">Complete</option>
                </select>
            </div>
            <div class="field-group">
                <label>Due date</label>
                <div class="due-date-row">
                    <input type="date" id="drawer-due-date">
                    <button id="btn-clear-due" class="btn-tiny" title="Clear due date">Clear</button>
                </div>
            </div>
            <div class="field-group">
                <label>Note</label>
                <textarea id="drawer-note" placeholder="Add details…" rows="6"></textarea>
            </div>
            <div id="drawer-meta" class="drawer-footer-info"></div>
        </div>
        <div class="drawer-actions">
            <button id="btn-save-card" class="btn-primary" style="display:none;">Add Card</button>
            <button id="btn-delete-card" class="btn-delete" style="display:none;">Delete card</button>
        </div>
    </aside>

    <!-- Generic confirm dialog -->
    <div id="confirm-overlay" class="overlay"></div>
    <div id="confirm-dialog" class="confirm-dialog">
        <p id="confirm-message"></p>
        <div class="confirm-actions">
            <button id="confirm-cancel" class="btn-ghost">Cancel</button>
            <button id="confirm-ok" class="btn-danger">Delete</button>
        </div>
    </div>

    <!-- Modals -->
    <div id="modal-overlay" class="overlay"></div>
    <div id="modal-container" class="modal-container">
        <div class="modal-content">
            <button id="modal-close" class="btn-close">&times;</button>
            <div id="modal-body"></div>
        </div>
    </div>

    <!-- Sprint rollover full-screen modal -->
    <div id="rollover-modal" class="rollover-modal">
        <div class="rollover-content" id="rollover-body"></div>
    </div>

    <!-- Past sprints full-screen overlay -->
    <div id="past-sprints-overlay" class="fullscreen-overlay">
        <div class="fullscreen-content">
            <button id="past-sprints-close" class="btn-close">&times;</button>
            <h2>Past Sprints</h2>
            <div id="past-sprints-body"></div>
        </div>
    </div>

    <!-- Lane options menu -->
    <div id="lane-menu" class="lane-menu">
        <button id="lane-menu-rename">Rename</button>
        <button id="lane-menu-delete">Delete</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>
    <script src="sync.js"></script>
</body>

</html>
